name: Deploy Admin

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: truthstride-dev
  REGION: us-central1
  REPOSITORY: containers-dev
  SERVICE: admin-dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.truthstride.com \
            -t us-central1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/admin:${{ github.sha }} \
            .

      - name: Push Image
        run: |
          docker push \
            us-central1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/admin:${{ github.sha }}

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy ${SERVICE} \
            --image us-central1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/admin:${{ github.sha }} \
            --region ${REGION}